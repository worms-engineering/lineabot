services:
  - type: web
    name: tennis-monitor-backend
    runtime: python
    rootDir: backend
    plan: starter        # "starter" ($7/mo) keeps the scheduler alive 24/7. "free" sleeps after 15 min idle.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DB_NAME
        value: tennis_monitor
      - key: USE_MOCK_DATA
        value: "false"
      - key: REFRESH_MINUTES
        value: "10"
      # Set these as secrets in the Render dashboard (do NOT commit real values):
      - key: MONGO_URL
        sync: false
      - key: THE_ODDS_API_KEY
        sync: false
      - key: ODDSPAPI_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CORS_ORIGINS
        sync: false      # set to your Vercel URL, e.g. https://your-app.vercel.app
